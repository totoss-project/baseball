<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>남자 헤어스타일별 헤어제품 추천</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>남자 헤어스타일별 헤어제품 추천</h1>
        <div class="selection-wrapper">
            <select id="hairstyle-select">
                <option value="">헤어스타일을 선택하세요</option>
                <option value="slick-back">슬릭백</option>
                <option value="pomade">포마드</option>
                <option value="shadow-perm">쉐도우펌</option>
                <option value="dandy-cut">댄디컷</option>
            </select>
            <button id="recommend-btn">추천 받기</button>
        </div>
        <div id="product-recommendation" class="recommendation-wrapper">
            <!-- 추천 제품 정보가 여기에 표시됩니다. -->
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
