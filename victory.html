<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>승리!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #3b82f6;
            --accent-hover: #2563eb;
            --strike-color: #10b981;
            --ball-color: #f59e0b;
            --out-color: #ef4444;
            --input-bg: #334155;
            --border-color: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1547820546-59a85d3f2b4e?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Make the background fixed */
            background-color: var(--bg-color); /* Still used for blend mode */
            background-blend-mode: overlay; /* Blend with the background-color */
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: center; /* Center content vertically */
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }

        .game-container {
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: relative;
            overflow: hidden;
            text-align: center; /* Center text within the container */
        }

        .game-container::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, var(--accent-primary), transparent);
            border-radius: 50%;
            opacity: 0.1;
            filter: blur(40px);
            z-index: 0;
        }

        .victory-content {
            z-index: 1; /* Ensure content is above pseudo-element */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        p {
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        p span {
            color: var(--accent-primary);
            font-weight: 700;
        }

        .ranking-form {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 300px;
        }

        input[type="text"] {
            flex: 1;
            background-color: var(--input-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem;
            font-size: 1rem;
            color: white;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-primary);
        }

        input[type="text"]::placeholder {
            color: #64748b;
        }

        button {
            background-color: var(--strike-color);
            color: white;
            padding: 0 1.5rem;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        button:hover {
            background-color: #059669; /* Darker green */
            transform: translateY(-2px);
        }

        button:active {
            transform: scale(0.96);
        }

        a {
            color: var(--ball-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 1rem;
            transition: color 0.2s;
        }

        a:hover {
            color: var(--accent-primary);
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="game-container">
            <div class="victory-content">
                <h1>축하합니다. 홈런입니다!</h1>
                <p>당신의 기록: <span id="record"></span></p>
                <div class="ranking-form">
                    <input type="text" id="player-name" placeholder="이름을 입력하세요">
                    <button id="save-rank">저장</button>
                </div>
                <a href="index.html">다시하기</a>
            </div>
        </div>
    </div>
    <script src="victory.js"></script>
</body>
</html>
